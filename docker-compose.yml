services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: pushy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: pushy
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pushy"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  pgdata:
